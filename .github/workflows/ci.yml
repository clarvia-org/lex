name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install uv
      - run: uv sync --frozen
      - run: uv run ruff format --check .
      - run: uv run ruff check .
      - run: uv run mypy src tests
      - run: for file in countries/*/adapter.py; do if [ -f "$file" ]; then uv run mypy "$file"; fi; done
      - run: uv run pytest --cov=lex --cov-report=term-missing
      - run: uv run lex check
      - run: uv run python scripts/check_internal_links.py
      - run: uv run python scripts/repo_size_report.py
      - run: uv build
